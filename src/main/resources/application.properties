spring.application.name=PPK3.0
server.port=8092
server.servlet.context-path=/eforms

# Spring DevTools - Live Reload Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms
spring.resources.static-locations=classpath:/static/
spring.resources.cache.period=0
spring.resources.chain.cache=false

# Enable log file reloading
spring.devtools.restart.log-condition-evaluation-delta=false

# Spring Datasource Configuration
#Staging
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#prod
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Staging
#spring.datasource.url=jdbc:mysql://10.32.0.43:3306/wilmuppkp
spring.datasource.url=jdbc:mysql://localhost:3306/wilmuppkp
#prod
#spring.datasource.url=jdbc:mysql://10.10.0.112:3306/wilmuppkp
#e-form-db
spring.datasource.username=root
spring.datasource.password=admin

spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

#spring.datasource.url=jdbc:mysql://localhost:3306/portal_dump
#spring.datasource.username=root
#spring.datasource.password=admin@2023
dbtype=mysql

# JPA/Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Folder for storing uploaded images
upload.path=uploads/room-images

# Fix for pattern matching in Spring MVC
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ====================================================================
# Log Hibernate SQL statements with parameter bindings - REDUCED
# ====================================================================
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
# ====================================================================
#Logging properties
# ====================================================================
logging.level.root=INFO
#logging.level.com.example=DEBUG
logging.level.org.springframework.boot.devtools=INFO

# ====================================================================
# Console logging pattern
# ====================================================================

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====================================================================
# File logging configuration
# ====================================================================

logging.file.name=logs/application.log
logging.file.max-size=100MB
logging.file.total-size-cap=100MB
logging.file.max-history=10

