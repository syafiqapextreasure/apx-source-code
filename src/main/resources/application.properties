spring.application.name=PPK3.0
server.port=8088
server.servlet.context-path=/eforms

# Spring Datasource Configuration
#Staging
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#prod
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
#Staging
spring.datasource.url=jdbc:mysql://10.32.0.43:3306/wilmuppkp
#spring.datasource.url=jdbc:mysql://localhost:3306/wilmuppkp
#prod
#spring.datasource.url=jdbc:mysql://10.10.0.112:3306/wilmuppkp
#e-form-db
spring.datasource.username=ilmuweb
spring.datasource.password=ilmuweb

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

#spring.datasource.url=jdbc:mysql://localhost:3306/portal_dump
#spring.datasource.username=root
#spring.datasource.password=admin@2023
dbtype=mysql

# JPA/Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB


# ====================================================================
# Log Hibernate SQL statements with parameter bindings
# ====================================================================
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# ====================================================================
#Logging properties
# ====================================================================
#logging.level.root=INFO
#logging.level.com.example=DEBUG

# ====================================================================
# Console logging pattern
# ====================================================================

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====================================================================
# File logging configuration
# ====================================================================

logging.file.name=logs/application.log
logging.file.max-size=100MB
logging.file.total-size-cap=100MB
logging.file.max-history=10
