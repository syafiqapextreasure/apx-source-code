<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Renewals</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <style>
        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
        }
        .status-1 {
            background-color: #d4edda;
            color: #155724;
        }
        .status-2 {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-3 {
            background-color: #f8d7da;
            color: #721c24;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar">
                <h3 class="mt-3 mb-4">Admin Panel</h3>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/admin-dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/membership-renewals">Membership Renewals</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/admin-dashboard">Room Management</a>
                    </li>
                </ul>
            </div>
            
            <main class="col-md-9 ml-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Membership Renewals</h1>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">All Memberships</h5>
                            </div>
                            <div class="col-auto">
                                <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search...">
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="membershipTable">
                                <thead>
                                    <tr>
                                        <th>Patron ID</th>
                                        <th>Name</th>
                                        <th>Expiry Date</th>
                                        <th>Status Code</th>
                                        <th>Status Description</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="renewal : ${renewals}">
                                        <td th:text="${renewal.GL14PATR}"></td>
                                        <td th:text="${renewal.GL14NAME}"></td>
                                        <td th:text="${renewal.GL14EXPDATE}"></td>
                                        <td>
                                            <span th:text="${renewal.GL14STAT}" 
                                                  th:class="${'status-badge ' + 'status-' + renewal.GL14STAT}">
                                            </span>
                                        </td>
                                        <td th:text="${renewal.GL08DESC}"></td>
                                        <td>
                                            <a th:href="@{/eforms/membership-renewal-service?username={id}(id=${renewal.GL14PATR})}" 
                                               class="btn btn-sm btn-primary">
                                                Process Renewal
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination-container">
                            <nav>
                                <ul class="pagination">
                                    <li class="page-item disabled">
                                        <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
                                    </li>
                                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                                    <li class="page-item">
                                        <a class="page-link" href="#">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Simple search function for the membership table
        $(document).ready(function() {
            $("#searchInput").on("keyup", function() {
                var value = $(this).val().toLowerCase();
                $("#membershipTable tbody tr").filter(function() {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
    </script>
</body>
</html>
