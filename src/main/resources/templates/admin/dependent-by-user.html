<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="ISO-8859-1">
    <title>Dependents by User ID</title>
    <style>
        /* Responsive table styles */
        .table-responsive {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Fix for table cell wrapping */
        .table td, .table th {
            white-space: normal;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <section>
        <div class="dashboard_main px-4 py-4">
            <div class="row dashboard_container">
                <div class="col-md-8 dashbord-right-container px-5 flex-grow-1">
                    <div>
                        <h1>
                            <span>DEPENDENTS FOR USER ID: </span>
                            <span th:text="${idPengguna}">user123</span>
                        </h1>
                        <a href="/eforms/admin/dependents" class="btn btn-sm mt-2" 
                           style="background-color: #005e9a; border-color: #005e9a; color: #ffffff;">
                            Back to All Dependents
                        </a>
                    </div>
                    
                    <!-- Dependents List Section -->
                    <div class="row table_section mt-4">
                        <div class="col-md-12 view_table">
                            <div class="table-responsive">
                                <table class="table table-bordered">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Login ID</th>
                                            <th>IC Number</th>
                                            <th>Relationship</th>
                                            <th>OKU Status</th>
                                            <th>Price</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Thymeleaf iteration over dependents -->
                                        <tr th:each="dependent : ${dependents}">
                                            <td th:text="${dependent.dependentId}">1</td>
                                            <td th:text="${dependent.loginId}">login123</td>
                                            <td th:text="${dependent.nokPTanggungan}">123456789012</td>
                                            <td th:text="${dependent.hubungan}">Spouse</td>
                                            <td th:text="${dependent.statusOKU}">No</td>
                                            <td th:text="${#numbers.formatDecimal(dependent.harga, 1, 2)}">100.00</td>
                                        </tr>
                                        
                                        <!-- Show message if no dependents found -->
                                        <tr th:if="${dependents.empty}">
                                            <td colspan="6" class="text-center">No dependents found for this user ID</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
