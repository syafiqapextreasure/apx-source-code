<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependents Dashboard (Direct)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>DEPENDENT MANAGEMENT (Direct Template)</h1>
        
        <!-- DEBUG INFO SECTION -->
        <!-- <div style="background-color: #f0f0f0; padding: 10px; margin: 10px 0; border: 1px solid #ccc;">
            <h3>Debug Information:</h3>
            <ul>
                <li>Current Page: <span th:text="${currentPage}">Not set</span></li>
                <li>Total Pages: <span th:text="${totalPages}">Not set</span></li>
                <li>Page Size: <span th:text="${pageSize}">Not set</span></li>
                <li>Total Items: <span th:text="${totalItems}">Not set</span></li>
                <li>Items on current page: <span th:text="${dependents != null ? dependents.size() : 'null'}">0</span></li>
            </ul>
        </div> -->
        
        <!-- Dependents Table -->
        <div class="table-responsive mt-4">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Login ID</th>
                        <th>User ID</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dependent : ${dependents}">
                        <td th:text="${dependent.dependentId}">1</td>
                        <td th:text="${dependent.loginId}">login123</td>
                        <td th:text="${dependent.idPengguna}">user123</td>
                        <td>
                            <button class="btn btn-sm btn-primary">View</button>
                        </td>
                    </tr>
                    <tr th:if="${dependents == null || dependents.empty}">
                        <td colspan="4" class="text-center">No dependents found</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Simple Pagination -->
        <div class="d-flex justify-content-between mt-3">
            <div>
                <span>Page <span th:text="${currentPage}">1</span> of <span th:text="${totalPages}">5</span></span>
            </div>
            <div>
                <a class="btn btn-sm btn-primary mx-1" href="?page=1">First</a>
                <a class="btn btn-sm btn-primary mx-1" th:href="@{/eforms/admin/dependents-direct(page=${currentPage - 1 > 0 ? currentPage - 1 : 1}, size=${pageSize})}">Previous</a>
                <a class="btn btn-sm btn-primary mx-1" th:href="@{/eforms/admin/dependents-direct(page=${currentPage + 1 <= totalPages ? currentPage + 1 : totalPages}, size=${pageSize})}">Next</a>
                <a class="btn btn-sm btn-primary mx-1" th:href="@{/eforms/admin/dependents-direct(page=${totalPages}, size=${pageSize})}">Last</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
