<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="ISO-8859-1">
    <title>Dependent Details</title>
    <style>
        .detail-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .detail-header {
            background-color: #005e9a;
            color: white;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            margin: -20px -20px 20px -20px;
        }
        
        .detail-row {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        
        .detail-label {
            font-weight: 600;
            width: 30%;
            color: #555;
        }
        
        .detail-value {
            width: 70%;
        }
        
        .back-btn {
            margin-top: 20px;
            background-color: #005e9a;
            border-color: #005e9a;
            color: #ffffff;
        }
        
        .back-btn:hover {
            background-color: #004b7c;
            border-color: #004b7c;
        }
    </style>
</head>
<body>
    <section>
        <div class="dashboard_main px-4 py-4">
            <div class="row dashboard_container">
                <div class="col-md-8 dashbord-right-container px-5 flex-grow-1">
                    <div>
                        <h1>
                            <span>DEPENDENT DETAILS</span>
                        </h1>
                    </div>
                    
                    <div class="detail-card mt-4">
                        <div class="detail-header">
                            <h2>Dependent Information</h2>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">ID</div>
                            <div class="detail-value" th:text="${dependent.dependentId}">1</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">Login ID</div>
                            <div class="detail-value" th:text="${dependent.loginId}">login123</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">User ID</div>
                            <div class="detail-value" th:text="${dependent.idPengguna}">user123</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">IC Number</div>
                            <div class="detail-value" th:text="${dependent.nokPTanggungan}">123456789012</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">Relationship</div>
                            <div class="detail-value" th:text="${dependent.hubungan}">Spouse</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">OKU Status</div>
                            <div class="detail-value" th:text="${dependent.statusOKU}">No</div>
                        </div>
                        
                        <div class="detail-row">
                            <div class="detail-label">Price</div>
                            <div class="detail-value" th:text="${#numbers.formatDecimal(dependent.harga, 1, 2)}">100.00</div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <a href="/admin/dependents" class="btn back-btn">Back to All Dependents</a>
                            
                            <a th:if="${dependent.loginId != null}" 
                               th:href="@{'/admin/dependents/login/' + ${dependent.loginId}}" 
                               class="btn back-btn ms-2">
                                See All Dependents for This Login
                            </a>
                            
                            <a th:if="${dependent.idPengguna != null}" 
                               th:href="@{'/admin/dependents/user/' + ${dependent.idPengguna}}" 
                               class="btn back-btn ms-2">
                                See All Dependents for This User
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
