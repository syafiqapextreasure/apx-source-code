<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Success</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<div class="card mt-4">
						<div class="card-header bg-success text-white">
							<h4 class="mb-0">Success!</h4>
						</div>
						<div class="card-body">
							<div class="alert alert-success">
								<p th:text="${message}">Your form has been submitted successfully.</p>
							</div>
							<div class="text-center mt-4">
								<a href="/eforms/admin/admin-dashboard" class="btn btn-primary">Go to Admin Dashboard</a>
								<a href="/eforms/" class="btn btn-secondary ms-2">Back to Home</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
