<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Login - PPK System</title>
</head>
<body>
		  <section>
        <div class="container mt-5 p-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
                        <div class="card-header text-center">
                            <h3 class="fs-4">Library System Login</h3>
                        </div>
                        <div class="card-body">
                            <div th:if="${param.error}" class="alert alert-danger text-center">
                                <p th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">
                                    Invalid login attempt.
                                </p>
                            </div>
                            <form th:action="@{/login}" method="post">
                                <!-- Hidden redirectUrl field if provided -->
                                <input type="hidden" name="redirectUrl" th:if="${redirectUrl}" th:value="${redirectUrl}">
                                
                                <div class="mb-3">
                                    <label for="username" class="form-label">Library ID or Email</label>
                                    <input
                                        id="username"
                                        required
                                        class="form-control"
                                        name="username"
                                        type="email"
                                        placeholder="Enter your registered email"
                                    >
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input
                                        id="password"
                                        required
                                        class="form-control"
                                        name="password"
                                        type="password"
                                        placeholder="Enter your password"
                                    >
                                </div>
                                <div class="d-grid gap-2">
                                    <button class="btn btn-primary" type="submit">Login</button>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center">
                            <p>Don't have an account? 
                                <a th:href="@{${redirectUrl != null ? '/register?redirectUrl=' + redirectUrl : '/register'}}" class="text-decoration-none">Create one</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
	</section>
</body>
</html>
