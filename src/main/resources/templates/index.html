	<style>
body {
	margin: 0;
	font-family: Arial, sans-serif;
}

/* Navbar Styling */
.navbar {
	display: flex;
	justify-content: space-between;
	align-items: center;
	background-color: #4CAF50;
	padding: 10px 20px;
}

.navbar .logo {
	color: white;
	font-size: 24px;
	font-weight: bold;
	text-decoration: none;
}

.navbar ul {
	list-style-type: none;
	margin: 0;
	padding: 0;
	display: flex;
}

.navbar ul li {
	margin: 0 15px;
}

.navbar ul li a {
	text-decoration: none;
	color: white;
	font-size: 18px;
	transition: color 0.3s;
}

.navbar ul li a:hover {
	color: #d4f5d6;
}

/* Responsive Menu */
.menu-toggle {
	display: none;
	flex-direction: column;
	cursor: pointer;
}

.menu-toggle div {
	background-color: white;
	height: 3px;
	width: 25px;
	margin: 3px 0;
}

@media ( max-width : 768px) {
	.navbar ul {
		display: none;
		flex-direction: column;
		background-color: #4CAF50;
		width: 100%;
		position: absolute;
		top: 60px;
		left: 0;
	}
	.navbar ul.show {
		display: flex;
	}
	.menu-toggle {
		display: flex;
	}
}
</style>

</div>

        const menu = document.getElementById('menu');
        menu.classList.toggle('show');

</script>
