<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
	rel="stylesheet" />
<link rel="stylesheet" th:href="@{/css/lmf/lmf.css}">
<title>LOST MATERIAL COMPLAINT FORM</title>
</head>

<body>
	<section>

		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		<script
			src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

		<div class="lostMaterialComplaintForm">
    <h1>Borang Bahan Hilang</h1>
<form id="form-id-sub" th:action="@{/submit}" method="POST">
    <div class="form_wrapper">
        <div class="row gx-md-4 gy-3 mb-3">
            <!-- Patron ID Field -->
            <div class="col-12 col-md-6 col-lg-5">
                <div class="form-group">
                    <label for="patronId">Patron ID<span class="cus-red">*</span>:</label>
                    <input type="text" class="form-control mt-2" id="patronId" name="patronId" required />
                </div>
            </div>

            <!-- Responsive Table -->
            <div class="col-12 mt-2">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th scope="col" style="width: 15%">Pilih</th>
                                <th scope="col">No Perolehan</th>
                                <th scope="col">Nama Buku</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyid">
                            <tr th:each="material : ${borrowedMaterials}">
                                <td>
                                    <input class="form-check-input" type="checkbox"
                                           th:id="'defaultCheck' + ${material.acquisitionNumber}"
                                           th:value="${material.acquisitionNumber}"
                                           name="acquisitionNumbers" />
                                </td>
                                <td th:text="${material.acquisitionNumber}">02121000993</td>
                                <td th:text="${material.bookTitle}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Date and Payment Fields -->
            <div class="col-12 col-md-6">
                <div class="form-group">
                    <label for="borrowDate">Tarikh Pinjaman:</label>
                    <input type="string" class="form-control mt-2" id="borrowDate" name="borrowDate" required />
                </div>
            </div>

            <div class="col-12 col-md-6">
                <div class="form-group">
                    <label for="returnDate">Tarikh Pulangan:</label>
                    <input type="string" class="form-control mt-2" id="returnDate" name="returnDate" required />
                </div>
            </div>

            <div class="col-12">
                <div class="form-group">
                    <label for="paymentMethod">Kaedah Pembayaran:</label>
                    <input type="text" class="form-control mt-2" id="paymentMethod" name="paymentMethod" required />
                </div>
            </div>

            <!-- Price Notes -->
            <div class="col-12">
                <div class="noted_text ps-2 mt-3">
                      <div id="totalPrice" class="d-block fw-bold">
    Jumlah Pembayaran (RM): <span id="totalPriceValue">40.00</span>
  </div>
    <input type="hidden" name="totalPayment" value="40.00" />
                    <p class="d-block text-muted">Perincian Harga Buku + Caj + Denda Lewat</p>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="daftar_btn d-flex gap-4 justify-content-end mt-4">
            <button type="submit" id="lost-material-btn-id">Hantar</button>
        </div>
    </div>
</form>
</div>


	   <!-- Script to show SweetAlert -->
    <script th:if="${message}">
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                title: 'Message',
                text: '[[${message}]]',
                icon: '[[${message.contains("Error") ? "error" : "success"}]]',
                confirmButtonText: 'OK'
            });
        });
    </script>
		<script type="text/javascript" th:src="@{/js/lostform.js}"></script>
	</section>
</body>

</html>
