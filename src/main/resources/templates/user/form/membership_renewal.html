<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.renewalForm_container{
    width: 100%;
    height: fit-content;
    padding: 2rem 4rem;
}

.renewalForm_container > div.form-wrapper{
    box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

.renewalForm_container h1{
    font-size: 24px;
    font-weight: 600;
    margin: 0;
    text-align: center;
}

.form_heading{
    width: fit-content;
    height: fit-content;
    background-color: rgb(126 126 126);
    padding: 6px 20px;
    border-radius: 4px;
    color: #FFF;
    font-size: 16px;
    font-weight: 400;
}

textarea{
    resize: none !important;
}

.table_form{
    box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
    padding: 2rem 3rem;
    border-radius: 6px;
}

.daftar_btn > button{
    border: none;
    font-size: 16px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 6px;
    letter-spacing: 1px;
}

.daftar_btn > button:first-child{
    background-color: rgb(32 78 59);
    color: #FFF;
}

.daftar_btn > button:hover{
    box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
}

@media screen and (max-width:991px) {
    .table_responsive{
        overflow-x: auto;
    }
}

</style>

<script>
// Auto-calculate Jumlah Harga
function updateTotal() {
  let total = 0;
  document.querySelectorAll('tbody tr').forEach(row => {
    const checkbox = row.querySelector('input[type="checkbox"]');
    if (checkbox && checkbox.checked) {
      const price = parseFloat(row.cells[4].innerText) || 0;
      total += price;
    }
  });
  document.querySelectorAll('p.mt-3').forEach(p => {
    if (p.textContent.includes('Jumlah Harga')) {
      p.textContent = 'Jumlah Harga: RM ' + total.toFixed(2);
                    	}
                    });
            }
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', updateTotal);
});
// Auto-set fee based on age group
function setFeeByAge() {
  const dob = document.getElementById('inputgroup81').value;
  if (!dob) return;
  const today = new Date();
  const birth = new Date(dob);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  let fee = 16;
  if (age < 18) fee = 10;
  else if (age >= 60) fee = 8;
  // Set fee in table (first row as example)
  const priceCell = document.querySelector('tbody tr td:last-child');
  if (priceCell) priceCell.innerText = fee;
  updateTotal();
}
document.getElementById('inputgroup81').addEventListener('change', setFeeByAge);
// Make button submit the form
const btn = document.querySelector('.daftar_btn > button');
if (btn) btn.onclick = function() {
  btn.closest('form').submit();
};
// Bypass access denied (front-end only)
// (No-op, just for testing)
        </script>
