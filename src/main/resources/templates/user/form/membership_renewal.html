		<script>
		var totalDependent=0
		 function calculateTotalHarga() {
		        let total = 0;
		        
		        // Loop through all checked checkboxes
		        document.querySelectorAll('.form-check-input:checked').forEach(function (checkbox) {
		            let row = checkbox.closest('tr'); // Find the parent row
		            if (row) {
		                let harga = parseFloat(row.querySelector('.hargaCell').textContent) || 0;
		                total += harga;
		                totalDependent=total;
		            }
		            
		        });
		        
		        document.getElementById('totalSum').textContent = 'Jumlah Harga: RM ' + total.toFixed(2);
		        
		    }

	       // Add event listeners to checkboxes to trigger calculateTotal when checked or unchecked
	       document.getElementById('tanggunganTableBody').addEventListener('change', function (event) {
				        if (event.target.classList.contains('form-check-input')) {
				            let checkbox = event.target;
				            let row = checkbox.closest('tr');
				            console.log("Checkbox:", checkbox, "Row:", row); // Debug log
				            calculateTotalHarga();
				        }
				    });

	function checkExpiryAndShowPopup(expiryDate) {
	    // Convert expiryDate to a Date object
	    let expiry = new Date(expiryDate);
	    
	    // Get the current date
	    let today = new Date();

	    // Calculate one month before expiry
	    let oneMonthBeforeExpiry = new Date(expiry);
	    oneMonthBeforeExpiry.setMonth(oneMonthBeforeExpiry.getMonth() - 1);

	    // Compare dates
	    if (today >= oneMonthBeforeExpiry) {
	    	Swal.fire({
				  title: 'Notification!',
				  text: 'Your subscription is about to expire or has expired!',
				  icon: 'Error',
				  confirmButtonText: 'OK',
				  position: 'top', // Ensures the popup is displayed at the top
				  customClass: {
				    popup: 'my-custom-popup' // Optional: Add your own class for further styling if needed
				  }
			
				});
	    }
	}
