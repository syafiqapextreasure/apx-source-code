<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Renewal Success</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .container { max-width: 500px; margin: 60px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 2rem; text-align: center; }
        .success { color: #28a745; font-size: 2rem; margin-bottom: 1rem; }
        .summary { text-align: left; margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="success">✅ Renewal submitted!</div>
    <div th:if="${message}">
        <p th:text="${message}"></p>
    </div>
    <div class="summary" th:if="${#maps.size(params) > 0}">
        <h4>Submitted Data:</h4>
        <ul>
            <li th:each="entry : ${params.entrySet()}" th:text="${entry.key + ': ' + entry.value}"></li>
        </ul>
    </div>
    <a href="/eforms/membership-renewal" style="display:inline-block;margin-top:2rem;color:#007bff;">Back to Renewal Form</a>
</div>
</body>
</html>
