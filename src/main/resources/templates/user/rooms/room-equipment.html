<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
	<section>

		<div class="singleReservationFrom p-md-5 p-2">
			<div
				class="singleReservation_main d-flex flex-column align-items-center justify-content-center">
				<h1>BORANG TEMPAHAN BILIK</h1>
				<div
					class="row filter_section d-flex justify-content-between flex-wrap gap-md-4 gap-2">
					<div class="image-wrapper">
						<i class="bi bi-house-door" style="font-size: 2rem; color: #fff;"></i>
					</div>
                    <button class="step-button special-width flex-grow-1" tabindex="0">Langkah 3-Persediaan Bilik</button>
				</div>
				<div class="card-section">
					<div class="offer-sticker" th:text="${room.labelName}">P9
						BILIK SERBAGUNA</div>
					<div class="room-card">
                                <img th:src="@{/img/room2.jpg}" alt="room img"  style="max-width: 100%; height: auto;" class="img-fluid "/> />
					</div>
					<div
						class="card-body d-flex justify-content-between flex-wrap align-items-center gap-2">
						<div>
							<p th:text="'Kapasiti: ' + ${room.capacity} + ' Orang'"></p>
							<p th:text="'Harga: RM' + ${#numbers.formatDecimal(room.price, 1, 'COMMA', 2, 'POINT')} + ' sejam'"></p>
						</div>
					</div>
				</div>

				<div class="form_section_box custome-width mt-5">
					<h1>TEMPAHAN BILIK</h1>
					<div class="container">
					
					<!-- Show Equipment Form only if available -->
					<form action="#" 
						  th:if="${equipmentAvailable}" 
						  th:action="@{'/save-room-booking-equipment/' + ${roomId}}" 
						  th:object="${equipmentForm}" 
						  method="post"
						  onsubmit="return validateForm()">
						<div class="row">
							<div class="col-md-12">
								<table class="table table-borderless">
									<thead>
										<tr>
											<th>Peralatan</th>
											<th>Kuantiti</th>
											<th>Harga (RM)</th>
										</tr>
									</thead>
									<tbody>
									<tr th:each="equipment, iterStat : ${equipmentForm.equipmentList}">
									<td>
										<div class="form-check">
											<input type="checkbox" class="form-check-input equipment-checkbox"
												   th:field="*{equipmentList[__${iterStat.index}__].selected}"
												   onchange="validateCheckbox(this)" 
												   th:attr="data-equipment-name=${equipment.equipmentName}"/> <label th:text="${equipment.equipmentName}"></label>
											<input type="hidden"
												   th:field="*{equipmentList[__${iterStat.index}__].equipmentName}"
												   th:value="${equipment.equipmentName}" />
										</div>
									</td>
									<td>
										<input type="number" class="form-control equipment-quantity"
											   th:field="*{equipmentList[__${iterStat.index}__].quantity}"
											   placeholder="0" min="0" value="0"
											   th:max="${(equipment.equipmentName.toLowerCase().contains('lcd') or equipment.equipmentName.toLowerCase().contains('komputer')) ? 1 : (equipment.equipmentName.toLowerCase().contains('kerusi') || equipment.equipmentName.toLowerCase().contains('chair') || equipment.equipmentName.toLowerCase().contains('meja') || equipment.equipmentName.toLowerCase().contains('table') ? room.capacity : 999)}"
											   onchange="calculateTotal()" /> </td>
									<td>
										<input type="hidden"
											   th:field="*{equipmentList[__${iterStat.index}__].price}"
											   th:value="${equipment.price}" />
										<span th:text="'RM' + ${#numbers.formatDecimal(equipment.price, 1, 'COMMA', 2, 'POINT')}"></span>
									</td>
									</tr>
									</tbody>
								</table>
								
								<!-- Submit Button with Onclick Validation -->
								<div class="button_wrapper">
									<button type="submit" onclick="return validateForm()">SETERUSNYA</button>
								</div>
								
								<!-- Button with JavaScript validation trigger -->
							   <!--  <div class="button_wrapper">
									<button type="submit">SETERUSNYA</button>
								</div> -->
							</div>
						</div>
					</form>

					<!-- Message if equipment cannot be chosen -->
					<div th:unless="${equipmentAvailable}"
						 class="alert alert-info mt-3">
						Peralatan tidak tersedia untuk jenis bilik ini.
						<div class="button_wrapper mt-3">
							<a th:href="@{/room-booking-summary/{id}(id=${roomId})}" class="btn-link">
								<button type="button" class="btn btn-primary">SETERUSNYA</button>
							</a>
						</div>
					</div>

					<script>
					function validateForm() {
					    const checkboxes = document.querySelectorAll('.equipment-checkbox');
					    const quantities = document.querySelectorAll('.equipment-quantity');
					    const roomCapacity = parseInt(document.getElementById('roomCapacity')?.value || '0');
					    let isAtLeastOneChecked = false;
					    let isValid = true;

					    checkboxes.forEach((checkbox, index) => {
					        const quantityInput = quantities[index];
					        const quantity = parseInt(quantityInput.value);
					        const equipmentName = checkbox.getAttribute('data-equipment-name').toLowerCase();
					        
					        if (checkbox.checked) {
					            isAtLeastOneChecked = true;
					            if (quantity < 1) {
					                alert(`Quantity for selected equipment must be at least 1.`);
					                isValid = false;
					                return; // exit forEach iteration for this item
					            }
					            
					            if (equipmentName.includes('lcd') && quantity > 1) {
					                alert('Maximum LCD quantity is 1');
					                quantityInput.value = 1;
					                // isValid = false; // Optionally mark as invalid if user manually inputs > 1
					            } else if ((equipmentName.includes('kerusi') || equipmentName.includes('chair') || equipmentName.includes('meja') || equipmentName.includes('table')) && quantity > roomCapacity) {
					                alert(`Quantity for ${equipmentName} cannot exceed room capacity of ${roomCapacity}.`);
					                quantityInput.value = roomCapacity; // Correct to max capacity
					                isValid = false;
					                return; // exit forEach iteration for this item
					            }
					        } else {
					            quantityInput.value = 0;
					        }
					    });

					    if (!isAtLeastOneChecked && isValid) { // only show if no other errors
					        // Check if any equipment is available before alerting
					        if (checkboxes.length > 0) {
					             alert('Please select at least one equipment.');
					             isValid = false;
					        }
					    }

					    return isValid; 
					}

					function validateCheckbox(checkbox) {
					    const index = Array.from(document.querySelectorAll('.equipment-checkbox')).indexOf(checkbox);
					    const quantityInput = document.querySelectorAll('.equipment-quantity')[index];
					    const equipmentName = checkbox.getAttribute('data-equipment-name').toLowerCase();
					    const roomCapacity = parseInt(document.getElementById('roomCapacity')?.value || '0');

					    if (checkbox.checked) {
					        if (equipmentName.includes('lcd') || equipmentName.includes('komputer')) {
					            quantityInput.value = 1;
					            quantityInput.max = 1;
					        } else if (equipmentName.includes('kerusi') || equipmentName.includes('chair') || equipmentName.includes('meja') || equipmentName.includes('table')) {
					            quantityInput.value = Math.min(roomCapacity, parseInt(quantityInput.value) || roomCapacity); 
					            quantityInput.max = roomCapacity;
					        } else {
					            quantityInput.value = quantityInput.value > 0 ? quantityInput.value : 1; // Default to 1 if not set
					        }
					    } else {
					        quantityInput.value = 0; 
					    }
					    // calculateTotal(); // Call if you have a total calculation function
					}

					function calculateTotal() {
					    // This function can be updated later for price calculations
					}

					// Function to initialize room capacity from the displayed value
					function initRoomCapacity() {
					    // Extract capacity from the display text
					    const capacityText = document.querySelector('.card-body p:first-child').textContent;
					    const capacityMatch = capacityText.match(/\d+/);
					    const capacity = capacityMatch ? capacityMatch[0] : 0;
					    
					    // Store capacity in a hidden input for later use
					    if (!document.getElementById('roomCapacity')) {
					        const hiddenInput = document.createElement('input');
					        hiddenInput.type = 'hidden';
					        hiddenInput.id = 'roomCapacity';
					        hiddenInput.value = capacity;
					        document.querySelector('form').appendChild(hiddenInput);
					    } else {
					        document.getElementById('roomCapacity').value = capacity;
					    }
					}

					// Call initialization on page load
					window.onload = function() {
					    initRoomCapacity();
					};
					</script>

					</div>
				</div>
			</div>
		</div>
		<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

/* Base styles for all devices */
.singleReservationFrom {
    width: 100%;
    height: fit-content;
    padding: 3rem 3rem;
}

.singleReservation_main {
    box-shadow: var(--box-shadow);
    padding: 2rem 0rem;
    border-radius: 6px;
}

.singleReservation_main h1 {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    color: #000;
}

.filter_section {
    box-shadow: var(--box-shadow);
    padding: 1rem 2rem;
    border-radius: 8px;
    width: 80%;
}

.image-wrapper {
    background-color: #000000;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.step-button {
    color: #000000;
    font-size: 16px;
    font-weight: 400;
    border-color: transparent;
    color: white;
    background-color: rgb(87, 134, 190);
    width: 150px;
    border-radius: 8px;
}

.filter-select {
    width: 150px;
}

.cari_btn {
    width: fit-content;
    padding: 3px 20px;
    border-radius: 8px;
    background-color: rgb(12, 33, 51);
    color: #fff;
    font-size: 16px;
    font-weight: 400;
    margin: 0;
}

.card-section {
    width: 80%;
    height: fit-content;
}

.room-card {
    width: 100%;
    height: 400px;
    height: fit-content;
}

.room-card img {
    width: 100%;
    height: 300px;
}

.card-body {
    color: #fff;
    padding: 1rem 2rem;
    width: 100%;
    background-color: rgb(14, 20, 42);
}

.card-body p {
    margin: 0;
}

.card-body button {
    background-color: rgb(209, 22, 13);
    padding: 6px 20px;
    border-radius: 6px;
    color: #fff;
    font-weight: 400;
    border: unset;
}

.offer-sticker {
    width: fit-content;
    padding: 8px 16px;
    background-color: rgb(254, 239, 2);
    position: relative;
    left: 40%;
    top: 40px;
}

.custome-width {
    width: 80%;
}

.form_section_box {
    box-shadow: var(--box-shadow);
    border-radius: 8px;
    padding: 2rem 2rem;
    overflow-x: auto;
}

.table-borderless {
    min-width: 700px;
}

.form_section_box h1 {
    text-align: left;
    margin-bottom: 20px;
}

.form-check-input:checked {
    background-color: rgb(69, 69, 69) !important;
    border-color: rgb(69, 69, 69) !important;
}

.button_wrapper {
    width: 100%;
    height: fit-content;
    display: flex;
    justify-content: flex-end;
}

.button_wrapper button {
    width: fit-content;
    padding: 6px 16px;
    border-radius: 8px;
    background-color: rgb(27, 37, 55);
    color: #fff;
    font-size: 16px;
    font-weight: 400;
}

/* Responsive styles for tablets (768px to 991px) */
@media screen and (max-width: 991px) {
    .singleReservationFrom {
        padding: 2rem 2rem; /* Reduce padding for tablets */
    }

    .filter_section {
        width: 90%; /* Adjust width for tablets */
    }

    .card-section {
        width: 90%; /* Adjust width for tablets */
    }

    .custome-width {
        width: 90%; /* Adjust width for tablets */
    }

    .step-button {
        width: 120px; /* Adjust button width for tablets */
    }

    .filter-select {
        width: 120px; /* Adjust select width for tablets */
    }

    .room-card img {
        height: 250px; /* Adjust image height for tablets */
    }
}

/* Responsive styles for mobile devices (up to 767px) */
@media screen and (max-width: 767px) {
    .singleReservationFrom {
        padding: 1rem; /* Further reduce padding for mobile */
    }

    .filter_section {
        width: 100%; /* Full width for mobile */
        padding: 1rem; /* Reduce padding for mobile */
    }

    .card-section {
        width: 100%; /* Full width for mobile */
    }

    .custome-width {
        width: 100%; /* Full width for mobile */
    }

    .step-button {
        width: 100px; /* Adjust button width for mobile */
        font-size: 14px; /* Smaller font size for mobile */
    }

    .filter-select {
        width: 100px; /* Adjust select width for mobile */
    }

    .room-card img {
        height: 200px; /* Adjust image height for mobile */
    }

    .offer-sticker {
        left: 30%; /* Adjust position for mobile */
        top: 30px; /* Adjust position for mobile */
    }

    .form_section_box {
        padding: 1rem; /* Reduce padding for mobile */
    }

    .form_section_box h1 {
        font-size: 16px; /* Smaller font size for mobile */
    }

    .button_wrapper button {
        font-size: 14px; /* Smaller font size for mobile */
        padding: 4px 12px; /* Adjust padding for mobile */
    }
}

/* Responsive styles for very small mobile devices (up to 480px) */
@media screen and (max-width: 480px) {
    .singleReservationFrom {
        padding: 0.5rem; /* Minimal padding for very small devices */
    }

    .filter_section {
        padding: 0.5rem; /* Minimal padding for very small devices */
    }

    .step-button {
        width: 80px; /* Very small button width for very small devices */
        font-size: 12px; /* Very small font size for very small devices */
    }

    .filter-select {
        width: 80px; /* Very small select width for very small devices */
    }

    .room-card img {
        height: 150px; /* Very small image height for very small devices */
    }

    .offer-sticker {
        left: 20%; /* Adjust position for very small devices */
        top: 20px; /* Adjust position for very small devices */
    }

    .form_section_box {
        padding: 0.5rem; /* Minimal padding for very small devices */
    }

    .form_section_box h1 {
        font-size: 14px; /* Very small font size for very small devices */
    }

    .button_wrapper button {
        font-size: 12px; /* Very small font size for very small devices */
        padding: 3px 10px; /* Minimal padding for very small devices */
    }
}

.btn-link {
    text-decoration: none;
    display: inline-block;
}
</style>

	</section>

</body>
</html>
