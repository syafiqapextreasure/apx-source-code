    <div class="row">

            <input type="checkbox" class="form-check-input equipment-checkbox"
                   th:field="*{equipmentList[__${iterStat.index}__].selected}"
                   onchange="validateCheckbox(this)" 
                   th:attr="data-equipment-name=${equipment.equipmentName}"/> <label th:text="${equipment.equipmentName}"></label>
            <input type="hidden"
                   th:field="*{equipmentList[__${iterStat.index}__].equipmentName}"
                   th:value="${equipment.equipmentName}" />
        </div>
    </td>
    <td>
        <input type="number" class="form-control equipment-quantity"
               th:field="*{equipmentList[__${iterStat.index}__].quantity}"
               placeholder="0" min="0" value="0"
               th:max="${equipment.equipmentName.contains('LCD') ? 1 : 999}"
               onchange="calculateTotal()" /> </td>
    <td>
        <input type="hidden"
               th:field="*{equipmentList[__${iterStat.index}__].price}"
               th:value="${equipment.price}" />
        <span th:text="${equipment.price} + ' MYR'"></span>
    </td>
    </tr>

</table>

<!-- Submit Button with Onclick Validation -->
<div class="button_wrapper">
    <button type="submit" onclick="return validateForm()">SETERUSNYA</button>
</div>


            <!-- Button with JavaScript validation trigger -->
           <!--  <div class="button_wrapper">

        </div>

<script>
function validateForm() {
    const checkboxes = document.querySelectorAll('.equipment-checkbox');
    const quantities = document.querySelectorAll('.equipment-quantity');
    let isAtLeastOneChecked = false;
    let isValid = true;

    checkboxes.forEach((checkbox, index) => {
        const quantity = quantities[index];
        const equipmentName = checkbox.getAttribute('data-equipment-name');
        
        if (checkbox.checked) {
            isAtLeastOneChecked = true;
            if (quantity.value < 1) {
                alert(`Quantity for selected equipment must be at least 1.`);
                isValid = false;
            }
            
            // Check LCD quantity - enforce maximum of 1
            if (equipmentName && equipmentName.includes('LCD') && quantity.value > 1) {
                alert('Maximum LCD quantity is 1');
                quantity.value = 1;
            }
        } else {
            // If not selected, set the quantity to 0
            quantity.value = 0;
        }
    });

    if (!isAtLeastOneChecked) {
        alert('Please select at least one equipment.');
        isValid = false;
    }

    return isValid; // Prevent form submission if validation fails
}

function validateCheckbox(checkbox) {
    const index = Array.from(document.querySelectorAll('.equipment-checkbox')).indexOf(checkbox);
    const quantityInput = document.querySelectorAll('.equipment-quantity')[index];
    const equipmentName = checkbox.getAttribute('data-equipment-name');
    
    if (checkbox.checked) {
        if (equipmentName && equipmentName.includes('LCD')) {
            quantityInput.value = 1;
            quantityInput.max = 1;
        } else if (equipmentName && (equipmentName.includes('Kerusi') || equipmentName.includes('Chair'))) {
            // Get room capacity and set as default chair count
            const capacity = document.getElementById('roomCapacity').value;
            quantityInput.value = capacity;
        } else if (equipmentName && (equipmentName.includes('Meja') || equipmentName.includes('Table'))) {
            // Calculate table count based on room capacity (assuming 1 table per 4 people)
            const capacity = document.getElementById('roomCapacity').value;
            const tableCount = Math.ceil(capacity / 4);
            quantityInput.value = tableCount;
        } else {
            quantityInput.value = 1; // Default value for other equipment
        }
    } else {
        quantityInput.value = 0; // Set value to zero when unchecked
    }
}

function calculateTotal() {
    // This function can be updated later for price calculations
}

// Function to initialize room capacity from the displayed value
function initRoomCapacity() {
    // Extract capacity from the display text
    const capacityText = document.querySelector('.card-body p:first-child').textContent;
    const capacityMatch = capacityText.match(/\d+/);
    const capacity = capacityMatch ? capacityMatch[0] : 0;
    
    // Store capacity in a hidden input for later use
    if (!document.getElementById('roomCapacity')) {
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.id = 'roomCapacity';
        hiddenInput.value = capacity;
        document.querySelector('form').appendChild(hiddenInput);
    } else {
        document.getElementById('roomCapacity').value = capacity;
    }
}

// Call initialization on page load
window.onload = function() {
    initRoomCapacity();
};
</script>
