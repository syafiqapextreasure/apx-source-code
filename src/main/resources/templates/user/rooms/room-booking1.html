      <script>
      document.addEventListener("DOMContentLoaded", function () {
          const filterTimeSelect = document.getElementById("filterTimeSelect");
          const formTimeSelect = document.getElementById("formTimeSelect");
          const roomTypeSelect = document.getElementById("roomType");
          const roomLocationSelect = document.getElementById("roomLocation");
          const datePickerInput = document.getElementById("datePicker");
          const searchButton = document.querySelector(".cari_btn");

          // Generate time ranges dynamically (1-hour intervals)
          function generateTimeRanges() {
              let timeRanges = [];
              const startHour = 8; // Start time (8:00 AM)
              const endHour = 22;  // End time (10:00 PM)

              for (let hour = startHour; hour < endHour; hour++) {
                  let startTime = formatTime(hour, 0);
                  let endTime = formatTime(hour + 1, 0);
                  timeRanges.push(`${startTime}-${endTime}`);
              }

              return timeRanges;
          }

          // Helper function to format time in 12-hour format with AM/PM
          function formatTime(hour, minute) {
              let hh = hour % 12 || 12;
              let mm = minute.toString().padStart(2, '0');
              let period = hour < 12 ? 'AM' : 'PM';
              return `${hh}:${mm}${period}`;
          }

          // Populate both dropdowns with time ranges
          function populateDropdowns() {
              const timeRanges = generateTimeRanges();
              
              // Clear existing options
              filterTimeSelect.innerHTML = "";
              formTimeSelect.innerHTML = "";

              // Add time ranges to both dropdowns
              timeRanges.forEach(range => {
                  let filterOption = new Option(range, range);
                  let formOption = new Option(range, range);
                  filterTimeSelect.appendChild(filterOption);
                  formTimeSelect.appendChild(formOption);
              });
          }

          // Initialize Choices.js for both dropdowns
          let filterChoicesInstance, formChoicesInstance;
          function initializeChoices() {
              filterChoicesInstance = new Choices(filterTimeSelect, {
                  removeItemButton: true,
                  placeholder: true,
                  placeholderValue: "Pilih waktu...",
                  searchEnabled: true,
                  shouldSort: false,
              });

              formChoicesInstance = new Choices(formTimeSelect, {
                  removeItemButton: true,
                  placeholder: true,
                  placeholderValue: "Pilih waktu...",
                  searchEnabled: true,
                  shouldSort: false,
              });

              // Add event listeners for validation
              filterTimeSelect.addEventListener("change", () => validateTimeSelection(filterChoicesInstance));
              formTimeSelect.addEventListener("change", () => validateTimeSelection(formChoicesInstance));
          }

          // Validate selected time ranges to prevent overlaps
          function validateTimeSelection(choicesInstance) {
              const selectedValues = choicesInstance.getValue(true);
              const selectedRanges = selectedValues.map(value => value.value);

              // Check for overlapping time ranges
              for (let i = 0; i < selectedRanges.length; i++) {
                  for (let j = i + 1; j < selectedRanges.length; j++) {
                      if (isOverlap(selectedRanges[i], selectedRanges[j])) {
                          Swal.fire({
                              icon: 'error',
                              title: 'Waktu Bertindih',
                              text: 'Waktu yang dipilih tidak boleh bertindih. Sila pilih waktu yang berbeza.',
                              confirmButtonText: 'OK'
                          });
                          // Remove the last selected item (the one causing the overlap)
                          choicesInstance.removeActiveItems();
                          return;
                      }
                  }
              }
          }

          // Helper function to check if two time ranges overlap
          function isOverlap(range1, range2) {
              // Safely parse time ranges, validate they are in correct format first
              if (!range1 || !range2 || !range1.includes('-') || !range2.includes('-')) {
                  console.error('Invalid time range format:', range1, range2);
                  return false;
              }
              
              const [start1, end1] = parseTimeRange(range1);
              const [start2, end2] = parseTimeRange(range2);
              
              if (start1 === null || end1 === null || start2 === null || end2 === null) {
                  console.error('Failed to parse time ranges:', range1, range2);
                  return false;
              }
              
              return start1 < end2 && start2 < end1;
          }

          // Helper function to parse a time range into start and end times (in minutes)
          function parseTimeRange(range) {
              try {
                  const [startTime, endTime] = range.split("-");
                  return [timeToMinutes(startTime), timeToMinutes(endTime)];
              } catch (error) {
                  console.error("Error parsing time range:", range, error);
                  return [null, null];
              }
          }

          // Helper function to convert a time string (e.g., "11:00AM") to minutes
          function timeToMinutes(time) {
              try {
                  if (!time) return null;
                  
                  // Handle different time formats with regex
                  const timeMatch = time.match(/(\d+):(\d+)(AM|PM)/i);
                  if (!timeMatch) {
                      console.error("Invalid time format:", time);
                      return null;
                  }
                  
                  const [_, hours, minutes, period] = timeMatch;
                  let hrs = parseInt(hours, 10);
                  let mins = parseInt(minutes, 10);
                  
                  // Convert to 24-hour format
                  if (period.toUpperCase() === "PM" && hrs !== 12) hrs += 12;
                  if (period.toUpperCase() === "AM" && hrs === 12) hrs = 0;
                  
                  return hrs * 60 + mins; // Convert to total minutes
              } catch (error) {
                  console.error("Error converting time to minutes:", time, error);
                  return null;
              }
          }

          // Setup search functionality
          searchButton.addEventListener("click", function() {
              const selectedRoomType = roomTypeSelect.value;
              const selectedLocation = roomLocationSelect.value;
              const selectedDates = datePickerInput.value;
              const selectedTimes = filterChoicesInstance ? 
                  filterChoicesInstance.getValue(true).map(value => value.value) : [];
              
              // Construct search parameters

              if (selectedRoomType) searchParams.append("roomType", selectedRoomType);
              if (selectedLocation) searchParams.append("location", selectedLocation);
              if (selectedDates) searchParams.append("dates", selectedDates);
              if (selectedTimes.length > 0) searchParams.append("times", selectedTimes.join(","));
              
              // Redirect to the search results or filter in place
              if (searchParams.toString()) {
                  window.location.href = window.location.pathname + "?" + searchParams.toString();
              }
          });

          // Initialize the dropdowns
          populateDropdowns();
          initializeChoices();
      });
      </script>

    // Function to check if a room is already booked for the selected dates and times
    async function checkRoomAvailability(roomId, startDate, endDate, selectedTimes) {
        try {
            // Until the API is implemented, use client-side fallback directly
            console.log("Using client-side fallback for room availability.");
            
            // Sample booking data (would be replaced by actual server data later)
            // Update sample data to include more realistic dates (including current month/year)
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth() + 1; // JavaScript months are 0-indexed
            
            // Format date as YYYY-MM-DD for sample data
            const formatDateString = (year, month, day) => {
                return `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            };
            
            // Create dates based on current month
            const today = formatDateString(currentYear, currentMonth, currentDate.getDate());
            const tomorrow = formatDateString(currentYear, currentMonth, currentDate.getDate() + 1);
            const dayAfterTomorrow = formatDateString(currentYear, currentMonth, currentDate.getDate() + 2);
            
            const existingBookings = [
                // Sample data including dates close to current date
                { id: 115, roomId: "10", startDate: today, endDate: tomorrow, times: ["11:00AM-12:00PM","12:00PM-1:00PM"] },
                { id: 116, roomId: "10", startDate: today, endDate: tomorrow, times: ["11:00AM-12:00PM","1:00PM-2:00PM"] },
                { id: 117, roomId: "10", startDate: tomorrow, endDate: dayAfterTomorrow, times: ["11:00AM-12:00PM","1:00PM-2:00PM"] },
                // Keep some future dates for testing
                { id: 120, roomId: "10", startDate: "2025-03-22", endDate: "2025-03-23", times: ["11:00AM-12:00PM","12:00PM-1:00PM"] },
                { id: 121, roomId: "10", startDate: "2025-03-22", endDate: "2025-03-23", times: ["11:00AM-12:00PM","12:00PM-1:00PM"] }
            ];
            
            console.log("Checking availability for roomId:", roomId);
            console.log("Selected dates:", startDate, "to", endDate);
            console.log("Selected times:", selectedTimes);
            
            // Convert input to ensure string comparison
            roomId = roomId.toString();
            
            // Check if there's an overlap with existing bookings
            const selectedStartDate = new Date(startDate);
            const selectedEndDate = new Date(endDate);
            
            // Array to store any conflicts for detailed reporting
            const conflicts = [];
            
            for (const booking of existingBookings) {
                // Skip if not the same room
                if (booking.roomId !== roomId) {
                    console.log(`Skipping booking ${booking.id} - different room (${booking.roomId} vs ${roomId})`);
                    continue;
                }
                
                const bookingStartDate = new Date(booking.startDate);
                const bookingEndDate = new Date(booking.endDate);
                
                // Check if dates overlap using more robust date comparison
                // Two date ranges overlap if one range's start date is before or equal to the other range's end date
                // AND one range's end date is after or equal to the other range's start date
                const datesOverlap = (
                    (selectedStartDate <= bookingEndDate && selectedEndDate >= bookingStartDate) ||
                    (bookingStartDate <= selectedEndDate && bookingEndDate >= selectedStartDate)
                );
                
                console.log(`Checking booking ${booking.id} - dates overlap: ${datesOverlap}`);
                
                if (datesOverlap) {
                    // Check if times overlap
                    for (const bookedTime of booking.times) {
                        if (selectedTimes.includes(bookedTime)) {
                            // Found a conflict - add to conflicts array
                            conflicts.push({
                                bookingId: booking.id,
                                date: booking.startDate + " to " + booking.endDate,
                                time: bookedTime
                            });
                            console.log(`Conflict found in booking ${booking.id} for time ${bookedTime}`);
                        }
                    }
                }
            }
            
            // Return results
            if (conflicts.length > 0) {
                console.log("Conflicts found:", conflicts);
                return {
                    available: false,
                    conflicts: conflicts
                };
            } else {
                console.log("No conflicts found");
                return {
                    available: true
                };
            }
        } catch (error) {
            console.error("Error checking room availability:", error);
            
            // In case of error, we'll return an error result
            return {
                available: false,
                error: true,
                message: error.message
            };
        }
    }

    // Modified validateForm to return a Promise
    async function validateForm() {
        try {
            const startDate = document.getElementById("startDate").value;
            const endDate = document.getElementById("endDate").value;
            const attendees = document.getElementById("attendees").value;
            const formTimeSelectElement = document.getElementById("formTimeSelect");
            const roomId = document.getElementById("roomId").value;
            
            // Check for required fields
            if (!startDate || !endDate || !attendees || !roomId) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Maklumat Tidak Lengkap',
                    text: 'Sila lengkapkan semua maklumat yang diperlukan.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            
            // Get selected times
            const formChoicesInstance = formTimeSelectElement && formTimeSelectElement.choices ? 
                                        formTimeSelectElement.choices : null;
            const selectedTimes = formChoicesInstance ? 
                                formChoicesInstance.getValue(true).map(value => value.value) : 
                                Array.from(formTimeSelectElement.selectedOptions).map(option => option.value);
            
            // Check if times are selected
            if (!selectedTimes || selectedTimes.length === 0) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Waktu Tidak Dipilih',
                    text: 'Sila pilih waktu untuk tempahan.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            
            // Check if start date is earlier than end date
            if (startDate && endDate && new Date(startDate) > new Date(endDate)) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Tarikh Tidak Sah',
                    text: 'Tarikh Tamat harus lebih besar dari Tarikh Mula.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }

            // Check if attendees is a valid positive number
            if (attendees && attendees <= 0) {
                await Swal.fire({
                    icon: 'error',
                    title: 'Bilangan Kehadiran Tidak Sah',
                    text: 'Bilangan Kehadiran harus lebih dari 0.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            
            // Check if room is already booked
            if (roomId && startDate && endDate && selectedTimes && selectedTimes.length > 0) {
                // Show loading indicator
                Swal.fire({
                    title: 'Memeriksa ketersediaan bilik...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });
                
                // Check room availability
                const availabilityResult = await checkRoomAvailability(roomId, startDate, endDate, selectedTimes);
                
                // Close loading indicator
                Swal.close();
                
                if (availabilityResult.error) {
                    // Handle error from availability check
                    await Swal.fire({
                        icon: 'warning',
                        title: 'Sistem Ralat',
                        text: 'Tidak dapat memeriksa ketersediaan bilik. Sila cuba lagi.',
                        confirmButtonText: 'OK',
                        allowOutsideClick: false
                    });
                    
                    // Continue with form submission despite the error
                    return true;
                }
                else if (!availabilityResult.available) {
                    // If we have detailed conflict information, include it in the message
                    let errorMessage = 'Bilik ini telah ditempah untuk tarikh dan waktu yang dipilih. Sila pilih tarikh atau waktu lain.';
                    
                    if (availabilityResult.conflicts && availabilityResult.conflicts.length > 0) {
                        // Format the conflicts for display
                        const conflictDetails = availabilityResult.conflicts.map(conflict => 
                            `• ${conflict.date}: ${conflict.time}`
                        ).join('<br>');
                        
                        errorMessage = `<p>Bilik ini telah ditempah untuk waktu berikut:</p>
                            <div style="text-align: left; margin-top: 10px;">
                                ${conflictDetails}
                            </div>
                            <p style="margin-top: 10px;">Sila pilih waktu lain yang masih tersedia.</p>`;
                    }
                    
                    await Swal.fire({
                        icon: 'error',
                        title: 'Bilik Tidak Tersedia',
                        html: errorMessage,
                        confirmButtonText: 'OK',
                        allowOutsideClick: false
                    });
                    return false;
                }
            }

            // If all validations pass
            return true;
        } catch (error) {
            console.error("Error in form validation:", error);
            
            // Show error message
            await Swal.fire({
                icon: 'error',
                title: 'Sistem Ralat',
                text: 'Ralat berlaku semasa mengesahkan borang: ' + error.message,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            });
            
            return false;
        }
    }

                    // Sample data including dates close to current date
                    { id: 115, roomId: "10", startDate: today, endDate: tomorrow, times: ["11:00AM-12:00PM","12:00PM-1:00PM"] },
                    { id: 116, roomId: "10", startDate: today, endDate: tomorrow, times: ["11:00AM-12:00PM","1:00PM-2:00PM"] },
                    { id: 117, roomId: "10", startDate: tomorrow, endDate: dayAfterTomorrow, times: ["11:00AM-12:00PM","1:00PM-2:00PM"] },
                    // Keep some future dates for testing
                    { id: 120, roomId: "10", startDate: "2025-03-22", endDate: "2025-03-23", times: ["11:00AM-12:00PM","12:00PM-1:00PM"] },
                    { id: 121, roomId: "10", startDate: "2025-03-22", endDate: "2025-03-23", times: ["11:00AM-12:00PM","12:00PM-1:00PM"] }
                ];
                
                // Convert roomId to string for comparison
                const roomIdStr = roomId.toString();
                const selectedStartDate = new Date(startDateInput.value);
                const selectedEndDate = new Date(endDateInput.value);
                
                // Check for overlaps with existing bookings
                const bookedTimes = [];
                for (const booking of existingBookings) {
                    // Skip if not the same room
                    if (booking.roomId !== roomIdStr) continue;
                    
                    const bookingStartDate = new Date(booking.startDate);
                    const bookingEndDate = new Date(booking.endDate);
                    
                    // Check if dates overlap using the same robust approach as checkRoomAvailability
                    const datesOverlap = (
                        (selectedStartDate <= bookingEndDate && selectedEndDate >= bookingStartDate) ||
                        (bookingStartDate <= selectedEndDate && bookingEndDate >= selectedStartDate)
                    );
                    
                    if (datesOverlap) {
                        // Add all booked times to the list
                        bookedTimes.push(...booking.times);
                    }
                }
                
                // Get unique booked times
                const uniqueBookedTimes = [...new Set(bookedTimes)];
                
                // Update choices with booked times
                updateChoicesWithBookedTimes(formChoicesInstance, uniqueBookedTimes);
            } catch (error) {
                console.error("Error disabling booked time slots:", error);
            }
        }
        
        // Helper function to update choices with booked times
        function updateChoicesWithBookedTimes(choicesInstance, bookedTimes) {
            if (!bookedTimes || bookedTimes.length === 0) return;
            
            // Disable booked time slots
            const choices = choicesInstance._store.choices;
            
            choices.forEach(choice => {
                if (bookedTimes.includes(choice.value)) {
                    // Mark as disabled and add visual indication
                    choice.disabled = true;
                }
            });
            
            // Force choices to re-render
            choicesInstance.setChoices(
                choices.map(c => ({
                    value: c.value,
                    label: c.label,
                    disabled: c.disabled
                })),
                'value',
                'label',
                true
            );
            
            // Add visual styling to disabled choices after render
            setTimeout(() => {
                bookedTimes.forEach(timeSlot => {
                    const element = document.querySelector(`.choices__item[data-value="${timeSlot}"]`);
                    if (element) {
                        element.classList.add('booked-time-slot');
                        element.setAttribute('title', 'Slot ini telah ditempah');
                    }
                });
            }, 100);
        }
        
        // Add listeners to date inputs to trigger disabling of booked time slots
        const startDateInput = document.getElementById("startDate");
        const endDateInput = document.getElementById("endDate");
        
        if (startDateInput) {
            startDateInput.addEventListener("change", disableBookedTimeSlots);
        }
        
        if (endDateInput) {
            endDateInput.addEventListener("change", disableBookedTimeSlots);
        }
    });

    
    document.addEventListener("DOMContentLoaded", function() {
        const errorMessageEl = document.getElementById('errorMessage');
        const successMessageEl = document.getElementById('successMessage');

        if (errorMessageEl && errorMessageEl.textContent) {
            // Check if the error is about room already booked
            const errorText = errorMessageEl.textContent.trim();
            const isRoomBookedError = errorText.includes("already booked") || 
                                     errorText.includes("telah ditempah") || 
                                     errorText.includes("tidak tersedia");
            
            Swal.fire({
                icon: 'error',
                title: isRoomBookedError ? 'Bilik Tidak Tersedia' : 'Booking Failed',
                text: errorMessageEl.textContent,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            }).then((result) => {
                // Scroll to the top of the form after acknowledging the error
                if (result.isConfirmed) {
                    const formElement = document.getElementById('bookingForm');
                    if (formElement) {
                        formElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        }

        if (successMessageEl && successMessageEl.textContent) {
            Swal.fire({
                icon: 'success',
                title: 'Booking Successful',
                text: successMessageEl.textContent,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            });
        }
        
        // Handle URL parameters for error feedback
        const urlParams = new URLSearchParams(window.location.search);
        const urlError = urlParams.get('error');
        if (urlError) {
            let errorMessage = decodeURIComponent(urlError);
            
            const isRoomBookedError = errorMessage.includes("already booked") || 
                                    errorMessage.includes("telah ditempah") || 
                                    errorMessage.includes("tidak tersedia");
            
            Swal.fire({
                icon: 'error',
                title: isRoomBookedError ? 'Bilik Tidak Tersedia' : 'Booking Failed',
                text: errorMessage,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            }).then((result) => {
                // Clean up the URL after showing the error
                if (result.isConfirmed) {
                    // Remove the error parameter from URL without reloading the page
                    if (window.history && window.history.replaceState) {
                        const cleanUrl = window.location.pathname + 
                                      (urlParams.toString() ? '?' + urlParams.toString() : '');
                        window.history.replaceState({}, document.title, cleanUrl);
                    }
                    
                    // Scroll to the booking form
                    const formElement = document.getElementById('bookingForm');
                    if (formElement) {
                        formElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        }
    });
</script>
