  <div class="singleReservationFrom p-md-5 p-2">

        <div class="card-body d-flex justify-content-between flex-wrap align-items-center gap-0">
          <div>
            <p th:text="'Kapasiti: ' + ${room.capacity} + ' Orang'"></p>
            <p th:text="'Harga: RM' + ${#numbers.formatDecimal(room.price, 1, 'COMMA', 2, 'POINT')} + ' sejam'"></p>

        </div>

      <!-- Error message for validation -->
<div id="capacityError" class="text-danger" style="display: none;">
    Bilangan kehadiran melebihi kapasiti bilik.
</div>
      
      <div class="form_section_box custome-width mt-5">
    <h1>TEMPAHAN BILIK</h1>
    <div class="container">
        <form id="bookingForm" th:action="@{/eforms/save-room-booking}" th:object="${roomBookingDetails}" method="post" onsubmit="return validateAndSubmitForm(event)">
            <input type="hidden" id="roomId" name="roomId" th:value="${room != null ? room.id : ''}" />
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="startDate" class="form-label">Tarikh Mula</label>
                        <input type="text" class="form-control" id="startDate" th:field="*{startDate}" required placeholder="Pilih Tarikh Mula">
            </div>
        </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="endDate" class="form-label">Tarikh Akhir</label>
                        <input type="text" class="form-control" id="endDate" th:field="*{endDate}" required placeholder="Pilih Tarikh Akhir">
            </div>
        </div>
    </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="time" class="form-label">Waktu</label>
                        <select class="form-select" id="time" th:field="*{time}" required>
                            <option value="">Pilih Waktu</option>
                            <!-- Time options will be populated by JavaScript -->
            </select>
        </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="attendees" class="form-label">Bilangan Kehadiran</label>
                        <input type="number" class="form-control" id="attendees" th:field="*{attendees}" th:attr="data-max-capacity=${room != null ? room.capacity : 0}" required min="1">
                    </div>
</div>
    </div>
    <div class="button_wrapper">
        <button type="submit">SETERUSNYA</button>
    </div>
</form>
    </div>
</div>

<script>
    // Helper function to format time (needed for generateTimeRanges)
    function formatTime(hour, minute) {
        const h = hour % 24; // Ensure hour is within 0-23 range
        const period = h < 12 || h === 24 ? 'AM' : 'PM'; // Midnight (0 or 24) is AM, Noon (12) is PM
        let displayHour = h % 12;
        if (displayHour === 0) displayHour = 12; // 0 or 12 should be displayed as 12

        const mm = minute.toString().padStart(2, '0');
        return `${displayHour}:${mm}${period}`;
    }

    // Function to generate time ranges dynamically (1-hour intervals)
    function generateTimeRanges() {
        let timeRanges = [];
        const startHour = 10; // Start at 8 AM
        const endHour = 18;  // End at 6 PM 

        for (let hour = startHour; hour < endHour; hour++) {
            let startTime = formatTime(hour, 0);
            let endTime = formatTime(hour + 1, 0);
            timeRanges.push(`${startTime}-${endTime}`);
        }
        // No sort needed if generated in order, but doesn't hurt
        return timeRanges; 
    }

    document.addEventListener("DOMContentLoaded", function() {
        // Global date picker instances
        let startDatePicker = null;
        let endDatePicker = null;
        
        // Check for any open flatpickr calendars and close them
        function closeAllCalendars() {
            const openCalendars = document.querySelectorAll('.flatpickr-calendar');
            openCalendars.forEach(cal => {
                if (cal.classList.contains('open')) {
                    cal.classList.remove('open');
                    cal.classList.add('closed');
                    cal.style.display = 'none';
                }
            });
        }
        
        // Close all calendars initially
        closeAllCalendars();
        
        // Time selection setup
        const timeSelect = document.getElementById('time');
        if (timeSelect) {
            // Clear existing options first, keeping the placeholder
            timeSelect.innerHTML = '<option value="">Pilih Waktu</option>'; 
            const generatedTimes = generateTimeRanges();
            generatedTimes.forEach(function(timeRange) {
                const option = document.createElement('option');
                option.value = timeRange;
                option.textContent = timeRange;
                timeSelect.appendChild(option);
            });
            
            // Add listener for time changes
            timeSelect.addEventListener('change', function() {
                if (window.bookedDateTimes) {
                    updateDatePickersWithBookedDates(window.bookedDateTimes);
                }
            });
        }

        // Get room ID from hidden input
        const roomId = document.getElementById('roomId').value;
        
        // Fetch already booked dates and times for this room
        if (roomId) {
            fetch(`/eforms/api/booked-dates/${roomId}`)
                .then(response => response.json())
                .then(bookedDates => {
                    // Store booked dates and times for later validation
                    window.bookedDateTimes = bookedDates;
                    console.log("Booked dates:", bookedDates);
                    
                    // Initialize date pickers
                    initializeDatepickers();
                })
                .catch(error => {
                    console.error('Error fetching booked dates:', error);
                    // Initialize date pickers anyway
                    initializeDatepickers();
                });
        } else {
            // Initialize date pickers if no room id
            initializeDatepickers();
        }
        
        function disableSpecificDate(date)
        {
            // To disable specific day
            
            var excludeDays = ['2021-09-04', '2021-09-12'];
            var dateArr = [String(date.getFullYear()), String(date.getMonth() + 1), String(date.getDate())];
            if (dateArr[1].length == 1) dateArr[1] = "0" + dateArr[1];
            if (dateArr[2].length == 1) dateArr[2] = "0" + dateArr[2];
            return excludeDays.indexOf(dateArr.join("-")) == -1;
          }
        
        function updateDisabledDates() 
        {
        	 startDatePicker.set("disable", [
                 function(date) {
             return date.getDay() === 1; // Still disable Mondays
             
                 }
     ]);
        	
        }
      
        
        
        // Function to initialize datepickers
        function initializeDatepickers() {
            // Common options for both date pickers
            const dateOptions = {
                dateFormat: "Y-m-d",
                minDate: "today",
                locale: {
                    firstDayOfWeek: 1,
                    weekdays: {
                        shorthand: ["Ahd", "Isn", "Sel", "Rab", "Kha", "Jum", "Sab"],
                        longhand: ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"]
                    },
                    months: {
                        shorthand: ["Jan", "Feb", "Mac", "Apr", "Mei", "Jun", "Jul", "Ogo", "Sep", "Okt", "Nov", "Dis"],
                        longhand: ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"]
                    }
                },
                disable: [
                    function(date)
                    {
                // Disable Mondays (day 1)
                return date.getDay() === 1;
                    }
                ],// Disable Mondays
                disableMobile: false,
                allowInput: true,
               
                monthSelectorType: "dropdown"
            };
            
            // Start date picker with special onChange
            startDatePicker = flatpickr("#startDate", {
                ...dateOptions,
                onChange: function(selectedDates, dateStr) {
                	
                    if (selectedDates.length > 0 && endDatePicker)
                    {
                        endDatePicker.set("minDate", dateStr);
                    }
                    updateDisabledDates();
                }
            });
            
              
            // End date picker
            endDatePicker = flatpickr("#endDate", dateOptions);
            
            // Apply booked dates styling if data is available
            if (window.bookedDateTimes && window.bookedDateTimes.length > 0) {
                updateDatePickersWithBookedDates(window.bookedDateTimes);
            }
        }
        
        // Function to validate and submit the form using AJAX
        window.validateAndSubmitForm = function(event) {
            event.preventDefault();
            
            const startDate = document.getElementById("startDate").value;
            const endDate = document.getElementById("endDate").value;
            const attendees = document.getElementById("attendees").value;
            const time = document.getElementById("time").value;

            if (!startDate || !endDate || !attendees || !time) {
                Swal.fire({
                    icon: 'error',
                    title: 'Maklumat Tidak Lengkap',
                    text: 'Sila lengkapkan semua maklumat yang diperlukan.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            if (new Date(startDate) > new Date(endDate)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Tarikh Tidak Sah',
                    text: 'Tarikh Tamat harus lebih besar dari Tarikh Mula.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            
            // Check if the date and time slot is already booked
            if (window.bookedDateTimes && isTimeSlotBooked(startDate, endDate, time)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Bilik Tidak Tersedia',
                    text: 'Slot masa ini telah ditempah. Sila pilih tarikh atau masa yang lain.',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false
                });
                return false;
            }
            
            // If validation passes, submit the form via AJAX
            const formData = new FormData(document.getElementById('bookingForm'));
            
            fetch(document.getElementById('bookingForm').action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error('Server error: ' + text);
                    });
                }
                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then(data => {
                if (data && data.error) {
                    // If server sends error message
                    Swal.fire({
                        icon: 'error',
                        title: 'Bilik Tidak Tersedia',
                        text: data.error || 'Slot masa ini telah ditempah. Sila pilih tarikh atau masa yang lain.',
                        confirmButtonText: 'OK',
                        allowOutsideClick: false
                    });
                } else {
                    // Redirect to next page (this should happen automatically via response.redirected above)
                    if (data && data.redirectUrl) {
                        // Ensure URL has /eforms/ prefix
                        let redirectUrl = data.redirectUrl;
                        if (redirectUrl.startsWith('/room-booking')) {
                            redirectUrl = '/eforms' + redirectUrl;
                        }
                        window.location.href = redirectUrl;
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (error.message && error.message.includes('already booked')) {
                    // Specifically handle booking conflicts
                    Swal.fire({
                        icon: 'error',
                        title: 'Bilik Tidak Tersedia',
                        text: 'Slot masa ini telah ditempah. Sila pilih tarikh atau masa yang lain.',
                        confirmButtonText: 'OK',
                        allowOutsideClick: false
                    });
                    
                    // Refresh the booked dates to update the calendar
                    fetch(`/eforms/api/booked-dates/${roomId}`)
                        .then(response => response.json())
                        .then(bookedDates => {
                            window.bookedDateTimes = bookedDates;
                            updateDatePickersWithBookedDates(bookedDates);
                        });
                } else {
                    // General error handling
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'An error occurred during booking. Please try again.',
                        confirmButtonText: 'OK',
                        allowOutsideClick: false
                    });
                }
            });
            
            return false; // Prevent traditional form submission
        };
        
        // Function to check if a time slot is already booked
        function isTimeSlotBooked(startDate, endDate, time) {
            if (!window.bookedDateTimes || !window.bookedDateTimes.length) {
                return false;
            }
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            for (const booking of window.bookedDateTimes) {
                const bookedStart = new Date(booking.startDate);
                const bookedEnd = new Date(booking.endDate);
                
                // Check for date overlap
                if ((start <= bookedEnd && end >= bookedStart) && booking.time === time) {
                    return true;
                }
            }
            
            return false;
        }
        
        // Function to update date pickers with booked dates highlighted
        function updateDatePickersWithBookedDates(bookedDates) {
            // Create a disable function that checks for booked dates
            const disableDates = [
                function(date) { 
                    return date.getDay() === 1; // Disable Mondays
                }
            ];
            
            // Get currently selected time (if any)
            const selectedTime = document.getElementById('time').value;
            
            // Clear existing styling first
            const allDays = document.querySelectorAll('.flatpickr-day');
            allDays.forEach(day => {
                day.classList.remove('booked-date');
            });
            
            // Custom class function to highlight booked dates
            function customDayCreate(dObj, dStr, fp, dayElem) {
                // Check if this date is already booked with any time slot
                for (const booking of bookedDates) {
                    const bookedStart = new Date(booking.startDate);
                    const bookedEnd = new Date(booking.endDate);
                    
                    // If we have a time selected, only highlight dates booked with that time
                    if (selectedTime && booking.time !== selectedTime) {
                        continue;
                    }
                    
                    // Check if this date falls within a booked range
                    if (dObj >= bookedStart && dObj <= bookedEnd) {
                        dayElem.classList.add('booked-date');
                        break;
                    }
                }
            }
            
            // Update the date pickers with the new functions
            if (startDatePicker) {
                // Apply disable function
                startDatePicker.set('disable', disableDates);
                // Apply custom day creation
                startDatePicker.set('onDayCreate', customDayCreate);
                // Force redraw
                startDatePicker.redraw();
            }
            
            if (endDatePicker) {
                // Apply disable function
                endDatePicker.set('disable', disableDates);
                // Apply custom day creation
                endDatePicker.set('onDayCreate', customDayCreate);
                // Force redraw
                endDatePicker.redraw();
            }
        }
        
        const errorMessageEl = document.getElementById('errorMessage');
        const successMessageEl = document.getElementById('successMessage');

        if (errorMessageEl && errorMessageEl.textContent) {
            const errorText = errorMessageEl.textContent.trim();
            const isRoomBookedError = errorText.includes("already booked") || errorText.includes("telah ditempah") || errorText.includes("tidak tersedia");
            Swal.fire({
                icon: 'error',
                title: isRoomBookedError ? 'Bilik Tidak Tersedia' : 'Booking Failed',
                text: errorMessageEl.textContent,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    const formElement = document.getElementById('bookingForm');
                    if (formElement) formElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        }

        if (successMessageEl && successMessageEl.textContent) {
            Swal.fire({
                icon: 'success',
                title: 'Booking Successful',
                text: successMessageEl.textContent,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            });
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlError = urlParams.get('error');
        if (urlError) {
            let errorMessageText = decodeURIComponent(urlError);
            const isRoomBookedError = errorMessageText.includes("already booked") || errorMessageText.includes("telah ditempah") || errorMessageText.includes("tidak tersedia");
            Swal.fire({
                icon: 'error',
                title: isRoomBookedError ? 'Bilik Tidak Tersedia' : 'Booking Failed',
                text: errorMessageText,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    const newUrlParams = new URLSearchParams(window.location.search);
                    newUrlParams.delete('error');
                    const cleanUrl = window.location.pathname + (newUrlParams.toString() ? '?' + newUrlParams.toString() : '');
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, cleanUrl);
                    }
                    const formElement = document.getElementById('bookingForm');
                    if (formElement) formElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        }

        const attendeesInput = document.getElementById("attendees");
        if (attendeesInput) {
            const maxCapacity = parseInt(attendeesInput.getAttribute("data-max-capacity")) || Infinity;
            attendeesInput.addEventListener("input", function () {
                const attendees = parseInt(attendeesInput.value);
                if (attendees > maxCapacity) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: 'Bilangan kehadiran melebihi kapasiti bilik (' + maxCapacity + ' orang).'
                    });
                    attendeesInput.value = maxCapacity;
                }
            });
        }

        const errorMessage = /*[[${errorMessage}]]*/ '';
        if (errorMessage && errorMessage.trim() !== '') {
            Swal.fire({
                icon: 'error',
                title: 'Ralat',
                text: errorMessage,
                confirmButtonText: 'OK',
                allowOutsideClick: false
            });
        }
    });
</script>

</div>
