<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
	rel="stylesheet" />
<link rel="stylesheet" href="/css/lmf/lmf.css">
<title>LOST MATERIAL COMPLAINT FORM</title>
</head>
<body>
	<section>
		<div class="lostMaterialComplaintForm">
			<h1>BORANG ADUAN BAHAN HILANG</h1>
			
			<form action="/user/lost-save" method="post">
			<div class="form_wrapper">
				<div class="row d-flex justify-content-between gap-md-4 gap-2 mb-3">
					<div class="form-group col-md-5">
						<label for="subject">Patron ID<span class="cus-red">*</span>:
						</label> <input type="text" class="form-control mt-2" id="subject" />
					</div>
					<div class="table_responsive mt-2">
						<table class="table table-bordered">
							<thead>
								<tr>
									<th scope="col">Pilih</th>
									<th scope="col">No Perolehan</th>
									<th scope="col">Nama Buku</th>
									<!-- <th scope="col">Status OKU</th> -->
									<!-- <th scope="col">Harga (RM)</th> -->
								</tr>
							</thead>
							<tbody>
								<tr th:each="material : ${borrowedMaterials}">
									<td><input class="form-check-input" type="checkbox"
										th:id="'defaultCheck' + ${material.id}"
										th:value="${material.id}" /></td>
									<td th:text="${material.acquisitionNumber}">02121000993</td>
									<td th:text="${material.bookTitle}">Anak</td>
								</tr>
							</tbody>

						</table>
					</div>
					<div class="form-group col-md-12">
						<label for="subject">Tarikh Pinjaman:</label> <input type="date"
							class="form-control mt-2" id="subject" />
					</div>
					<div class="form-group col-md-12">
						<label for="subject">Tarikh Pulangan:</label> <input type="date"
							class="form-control mt-2" id="subject" />
					</div>
					<div class="form-group col-md-12">
						<label for="subject">Kaedah Pembayaran:</label> <input type="text"
							class="form-control mt-2" id="subject" />
					</div>
					<div class="noted_text">
						<p>Jumlah Pembayaran (RM): XX.XX</p>
						<p>Perincian Harga Buku + Caj + Denda Lewat</p>
					</div>
				</div>
				<div class="daftar_btn d-flex gap-4 justify-content-end mt-4">
					<button type="submit">Hantar</button>
				</div>
			</div>
		</div>
		</form>
	</section>
</body>
</html>
